[build]
  publish = "dist/public"
  command = "cd ../.. && pnpm install && pnpm --filter @workspace/roadside-pantry run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term cache for hashed assets (JS, CSS)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Medium cache for images and videos
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# No cache for HTML (SPA entry)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
